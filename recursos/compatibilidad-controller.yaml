openapi: 3.0.0
info:
  title: API de Compatibilidad de Productos
  description: API para la gestión de la compatibilidad entre productos (piezas) y motos.
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /compatibilidad:
    post:
      summary: Enlazar un producto con una moto
      description: Registra una nueva compatibilidad entre un producto (pieza) y una moto.
      operationId: enlazarProductoConMoto
      tags:
        - Compatibilidad
      requestBody:
        description: Datos de la compatibilidad a registrar.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompatibilidadInput'
      responses:
        '211':
          description: Compatibilidad registrada correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  exitoso:
                    type: boolean
                    example: true
                  mensaje:
                    type: string
                    example: Compatibilidad registrada correctamente
                  id:
                    type: integer
                    format: int64
                    example: 1

  /compatibilidad/producto/{sku}:
    get:
      summary: Buscar compatibilidad por SKU de producto
      description: Devuelve una lista de motos compatibles con un producto (pieza) específico, buscado por su SKU.
      operationId: buscarPorSku
      tags:
        - Compatibilidad
      parameters:
        - name: sku
          in: path
          description: SKU del producto a buscar.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de compatibilidades obtenida con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CompatibilidadProducto'

  /compatibilidad/moto/{motoId}:
    get:
      summary: Buscar compatibilidad por ID de moto
      description: Devuelve una lista de productos (piezas) compatibles con una moto específica, buscada por su ID.
      operationId: buscarPorMoto
      tags:
        - Compatibilidad
      parameters:
        - name: motoId
          in: path
          description: ID de la moto a buscar.
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Lista de compatibilidades obtenida con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CompatibilidadProducto'

components:
  schemas:
    CompatibilidadProducto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        skuInterno:
          type: string
        motoId:
          type: integer
      required:
        - skuInterno
        - motoId
    CompatibilidadInput:
      type: object
      properties:
        skuInterno:
          type: string
        motoId:
          type: integer
      required:
        - skuInterno
        - motoId
