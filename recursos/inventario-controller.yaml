openapi: 3.0.0
info:
  title: API de Inventario
  description: API para la gestión de inventario en sucursales.
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /inventario/sucursales/{sucursalId}:
    get:
      summary: Consultar inventario de una sucursal
      description: Devuelve el inventario de una sucursal específica.
      operationId: obtenerInventarioPorSucursal
      tags:
        - Inventario
      parameters:
        - name: sucursalId
          in: path
          description: ID de la sucursal.
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Inventario de la sucursal obtenido con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventarioSucursalDTO'

  /inventario:
    post:
      summary: Registrar o actualizar existencias
      description: Registra o actualiza las existencias de un producto en una sucursal.
      operationId: registrarStock
      tags:
        - Inventario
      requestBody:
        description: Datos del inventario a registrar o actualizar.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventarioSucursalInput'
      responses:
        '201':
          description: Inventario registrado/actualizado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  exitoso:
                    type: boolean
                    example: true
                  mensaje:
                    type: string
                    example: Inventario registrado/actualizado correctamente
                  fechaRegistro:
                    type: string
                    format: date-time

components:
  schemas:
    InventarioSucursalDTO:
      type: object
      properties:
        sucursalId:
          type: integer
        nombreSucursal:
          type: string
        productoId:
          type: integer
        nombreProducto:
          type: string
        stock:
          type: integer

    InventarioSucursalInput:
      type: object
      properties:
        sucursalId:
          type: integer
        productoId:
          type: integer
        stock:
          type: integer
      required:
        - sucursalId
        - productoId
        - stock
