openapi: 3.0.0
info:
  title: API de Productos Maestro
  description: API para la gestión del catálogo maestro de productos.
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /productos/search:
    get:
      summary: Búsqueda omnicanal de productos
      description: Motor de búsqueda avanzado para localizar productos por múltiples criterios con paginación.
      operationId: buscarProductos
      tags:
        - Inventario
      parameters:
        - name: q
          in: query
          description: Término de búsqueda general (nombre, SKU, etc.).
          required: false
          schema:
            type: string
        - name: categoriaId
          in: query
          description: ID de la categoría para filtrar.
          required: false
          schema:
            type: integer
        - name: motoId
          in: query
          description: ID de la moto para filtrar por compatibilidad.
          required: false
          schema:
            type: integer
        - name: anio
          in: query
          description: Año de la moto para filtrar por compatibilidad.
          required: false
          schema:
            type: integer
        - name: page
          in: query
          description: Número de página.
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Tamaño de la página.
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Búsqueda exitosa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageProductoMaestro'

  /productos:
    post:
      summary: Crear un nuevo producto maestro
      description: Registra un nuevo producto en el catálogo maestro.
      operationId: crearProducto
      tags:
        - Inventario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductoMaestroInput'
      responses:
        '201':
          description: Producto creado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  exitoso:
                    type: boolean
                  mensaje:
                    type: string
                  skuInterno:
                    type: string

  /productos/{sku}:
    get:
      summary: Obtener un producto por SKU
      description: Devuelve los detalles completos de un producto a partir de su SKU interno.
      operationId: obtenerPorSku
      tags:
        - Inventario
      parameters:
        - name: sku
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Producto encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseProductoMaestro'
        '404':
          description: Producto no encontrado.

    put:
      summary: Actualizar un producto
      description: Actualiza la información de un producto existente.
      operationId: actualizar
      tags:
        - Inventario
      parameters:
        - name: sku
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductoMaestroInput'
      responses:
        '200':
          description: Producto actualizado con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseProductoMaestro'
        '404':
          description: Producto no encontrado.

    delete:
      summary: Eliminar un producto
      description: Elimina un producto del catálogo maestro.
      operationId: eliminar
      tags:
        - Inventario
      parameters:
        - name: sku
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Producto eliminado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '404':
          description: Producto no encontrado.

  /productos/mostrador:
    get:
      summary: Buscar productos para mostrador
      description: Búsqueda optimizada para el punto de venta en una sucursal específica.
      operationId: buscarParaMostrador
      tags:
        - Inventario
      parameters:
        - name: q
          in: query
          description: Término de búsqueda.
          required: true
          schema:
            type: string
        - name: sucursalId
          in: query
          description: ID de la sucursal donde se realiza la búsqueda.
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Búsqueda exitosa.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductoResumenDTO'

components:
  schemas:
    ProductoMaestro:
      type: object
      properties:
        skuInterno:
          type: string
        nombreComercial:
          type: string
        claveSat:
          type: string
        stockMinimoGlobal:
          type: integer
        # ... otros campos del producto maestro

    ProductoMaestroInput:
      type: object
      properties:
        skuInterno:
          type: string
        nombreComercial:
          type: string
        claveSat:
          type: string
        stockMinimoGlobal:
          type: integer

    ProductoResumenDTO:
      type: object
      properties:
        # ... campos del DTO de resumen
        skuInterno:
          type: string
        nombreComercial:
          type: string
        stockEnSucursal:
          type: integer

    PageProductoMaestro:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ProductoMaestro'
        pageable:
          type: object # O un ref a una definición de Pageable si es compleja
        totalPages:
          type: integer
        totalElements:
          type: integer
        last:
          type: boolean
        size:
          type: integer
        number:
          type: integer
        numberOfElements:
          type: integer
        first:
          type: boolean
        empty:
          type: boolean

    ApiResponseProductoMaestro:
      type: object
      properties:
        mensaje:
          type: string
        data:
          $ref: '#/components/schemas/ProductoMaestro'

    ApiResponseVoid:
      type: object
      properties:
        mensaje:
          type: string
        data:
          type: object
          nullable: true
