openapi: 3.0.0
info:
  title: API de Producto Maestro
  description: API para la gestión del catálogo maestro de productos.
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /productos/search:
    get:
      summary: Motor de búsqueda omnicanal de productos
      description: Búsqueda dinámica de productos con filtros por texto, categoría, moto y año, con paginación.
      operationId: buscarProductos
      tags:
        - Productos
      parameters:
        - name: q
          in: query
          description: Término de búsqueda general (nombre, SKU, etc.)
          required: false
          schema:
            type: string
        - name: categoriaId
          in: query
          description: ID de la categoría del producto.
          required: false
          schema:
            type: integer
        - name: motoId
          in: query
          description: ID de la moto para la que es compatible el producto.
          required: false
          schema:
            type: integer
        - name: anio
          in: query
          description: Año de la moto.
          required: false
          schema:
            type: integer
        - name: page
          in: query
          description: Número de la página a obtener.
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Tamaño de la página.
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Búsqueda exitosa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageProductoMaestro'

  /productos:
    post:
      summary: Crear un nuevo producto maestro
      description: Registra un nuevo producto en el catálogo maestro.
      operationId: crearProducto
      tags:
        - Productos
      requestBody:
        description: Datos del producto a crear.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductoMaestroInput'
      responses:
        '211':
          description: Producto creado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  exitoso:
                    type: boolean
                    example: true
                  mensaje:
                    type: string
                    example: Producto creado correctamente
                  skuInterno:
                    type: string
                    example: NEX-001

  /productos/{sku}:
    get:
      summary: Obtener un producto por SKU
      description: Devuelve los detalles completos de un producto maestro por su SKU.
      operationId: obtenerPorSku
      tags:
        - Productos
      parameters:
        - name: sku
          in: path
          description: SKU interno del producto.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Producto encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseProducto'
        '404':
          description: El producto no fue encontrado.

    put:
      summary: Actualizar un producto existente
      description: Actualiza los datos de un producto maestro por su SKU.
      operationId: actualizar
      tags:
        - Productos
      parameters:
        - name: sku
          in: path
          description: SKU interno del producto a actualizar.
          required: true
          schema:
            type: string
      requestBody:
        description: Datos del producto a actualizar.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductoMaestroInput'
      responses:
        '200':
          description: Producto actualizado con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseProducto'
        '404':
          description: El producto no fue encontrado.

    delete:
      summary: Eliminar un producto
      description: Elimina un producto maestro del catálogo por su SKU.
      operationId: eliminar
      tags:
        - Productos
      parameters:
        - name: sku
          in: path
          description: SKU interno del producto a eliminar.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Producto eliminado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '404':
          description: El producto no fue encontrado.

  /productos/mostrador:
    get:
      summary: Buscar productos para mostrador
      description: Búsqueda optimizada para el punto de venta, devolviendo un resumen de productos y su stock en una sucursal.
      operationId: buscarParaMostrador
      tags:
        - Productos
      parameters:
        - name: q
          in: query
          description: Término de búsqueda (nombre, SKU, etc.)
          required: true
          schema:
            type: string
        - name: sucursalId
          in: query
          description: ID de la sucursal donde se realiza la búsqueda.
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Búsqueda exitosa.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductoResumenDTO'

components:
  schemas:
    ProductoMaestro:
      type: object
      properties:
        skuInterno:
          type: string
        nombreComercial:
          type: string
        claveSat:
          type: string
        stockMinimoGlobal:
          type: integer
      required:
        - skuInterno
        - nombreComercial

    ProductoMaestroInput:
      type: object
      properties:
        skuInterno:
          type: string
        nombreComercial:
          type: string
        claveSat:
          type: string
        stockMinimoGlobal:
          type: integer
      required:
        - skuInterno
        - nombreComercial

    ProductoResumenDTO:
      type: object
      description: Resumen de un producto para el punto de venta.
      properties:
        skuInterno:
          type: string
        nombreProducto:
          type: string
        stock:
          type: integer
        ubicacion:
          type: string

    PageProductoMaestro:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ProductoMaestro'
        totalPages:
          type: integer
        totalElements:
          type: integer
        size:
          type: integer
        number:
          type: integer

    ApiResponseProducto:
      type: object
      properties:
        mensaje:
          type: string
        datos:
          $ref: '#/components/schemas/ProductoMaestro'

    ApiResponseVoid:
      type: object
      properties:
        mensaje:
          type: string
        datos:
          type: object
          nullable: true
