openapi: 3.0.0
info:
  title: API de Traspasos de Inventario
  description: API para gestionar traspasos de productos entre sucursales.
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /inventario/traspasos:
    post:
      summary: Realizar un traspaso de inventario
      description: Ejecuta un traspaso de productos de una sucursal de origen a una de destino.
      operationId: realizarTraspaso
      tags:
        - Inventario
      requestBody:
        description: Datos del traspaso a realizar.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraspasoRequestDTO'
      responses:
        '200':
          description: Traspaso completado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  exitoso:
                    type: boolean
                    example: true
                  mensaje:
                    type: string
                    example: Traspaso completado correctamente
                  rastreoId:
                    type: string
                    description: ID único para el seguimiento del traspaso.
                    example: TR-20240521-12345

components:
  schemas:
    TraspasoRequestDTO:
      type: object
      properties:
        sucursalOrigenId:
          type: integer
          description: ID de la sucursal de origen.
        sucursalDestinoId:
          type: integer
          description: ID de la sucursal de destino.
        productos:
          type: array
          items:
            $ref: '#/components/schemas/ProductoTraspasoDTO'
      required:
        - sucursalOrigenId
        - sucursalDestinoId
        - productos

    ProductoTraspasoDTO:
      type: object
      properties:
        productoId:
          type: string
          description: SKU del producto a traspasar.
        cantidad:
          type: integer
          description: Cantidad del producto a traspasar.
      required:
        - productoId
        - cantidad
