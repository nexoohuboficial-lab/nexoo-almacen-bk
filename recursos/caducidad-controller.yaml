openapi: 3.0.1
info:
  title: Caducidad Controller API
  description: API REST para gestión de productos con fechas de caducidad próximas o vencidas
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Servidor local

paths:
  /api/v1/inventario/caducidad/proximos:
    get:
      tags:
        - Caducidad
      summary: Obtener productos próximos a caducar
      description: Retorna lista de productos cuya fecha de caducidad está dentro del número de días especificado
      operationId: obtenerProductosProximosCaducar
      parameters:
        - name: dias
          in: query
          description: Número de días límite para considerar un producto próximo a caducar
          required: false
          schema:
            type: integer
            default: 30
            example: 30
      responses:
        '200':
          description: Lista de productos próximos a caducar obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductoCaducidadDTO'
        '401':
          description: No autorizado - Token JWT inválido o ausente
        '500':
          description: Error interno del servidor
      security:
        - bearerAuth: []

  /api/v1/inventario/caducidad/vencidos:
    get:
      tags:
        - Caducidad
      summary: Obtener productos ya caducados
      description: Retorna lista de productos cuya fecha de caducidad ya venció
      operationId: obtenerProductosCaducados
      responses:
        '200':
          description: Lista de productos caducados obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductoCaducidadDTO'
        '401':
          description: No autorizado - Token JWT inválido o ausente
        '500':
          description: Error interno del servidor
      security:
        - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtenido del endpoint /api/v1/auth/login

  schemas:
    ProductoCaducidadDTO:
      type: object
      properties:
        skuInterno:
          type: string
          description: SKU interno del producto
          example: "ACE-MOT-001"
        nombreComercial:
          type: string
          description: Nombre comercial del producto
          example: "Aceite Motul 10W40"
        sucursalNombre:
          type: string
          description: Nombre de la sucursal donde está el producto
          example: "Sucursal Centro"
        cantidadDisponible:
          type: integer
          description: Cantidad en stock
          example: 15
        fechaCaducidad:
          type: string
          format: date
          description: Fecha de caducidad del producto
          example: "2026-04-15"
        diasRestantes:
          type: integer
          description: Días restantes hasta la caducidad (negativo si ya caducó)
          example: 25
