openapi: 3.0.0
info:
  title: API de Precios Especiales
  description: API para la gestión de precios especiales por tipo de cliente.
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /precios-especiales:
    post:
      summary: Asignar un precio especial
      description: Asigna un precio especial a un producto para un tipo de cliente específico.
      operationId: crearPrecioEspecial
      tags:
        - Catálogo
      requestBody:
        description: Datos del precio especial a asignar.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrecioEspecialInput'
      responses:
        '201':
          description: Precio especial asignado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  exitoso:
                    type: boolean
                    example: true
                  mensaje:
                    type: string
                    example: Precio especial asignado correctamente
                  id:
                    type: integer

  /precios-especiales/{id}:
    delete:
      summary: Eliminar un precio especial
      description: Elimina un precio especial existente.
      operationId: eliminarPrecioEspecial
      tags:
        - Catálogo
      parameters:
        - name: id
          in: path
          description: ID del precio especial a eliminar.
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Precio especial eliminado correctamente.

components:
  schemas:
    PrecioEspecial:
      type: object
      properties:
        id:
          type: integer
        productoId:
          type: integer
        tipoClienteId:
          type: integer
        precio:
          type: number
          format: double

    PrecioEspecialInput:
      type: object
      properties:
        productoId:
          type: integer
        tipoClienteId:
          type: integer
        precio:
          type: number
          format: double
      required:
        - productoId
        - tipoClienteId
        - precio
