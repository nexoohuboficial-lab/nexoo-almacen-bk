openapi: 3.0.1
info:
  title: Dashboard Controller API
  description: API REST para dashboards ejecutivos y métricas clave del negocio
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Servidor local

paths:
  /api/v1/dashboard:
    get:
      tags:
        - Dashboard
      summary: Obtener dashboard ejecutivo
      description: |
        Retorna métricas clave del negocio incluyendo:
        - Ventas del día y del mes
        - Ticket promedio
        - Productos con stock bajo
        - Devoluciones del día
        - Clientes bloqueados
        - Productos próximos a caducar
      operationId: obtenerDashboard
      responses:
        '200':
          description: Dashboard obtenido exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardDTO'
              example:
                ventasDelDia: 45000.00
                ventasDelMes: 1250000.00
                ticketPromedio: 1500.00
                productosStockBajo: 12
                devolucionesDelDia: 3
                clientesBloqueados: 5
                productosProximosCaducar: 8
                ultimaActualizacion: "2026-03-06T14:30:00"
        '401':
          description: No autorizado - Token JWT inválido o ausente
        '500':
          description: Error interno del servidor
      security:
        - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtenido del endpoint /api/v1/auth/login

  schemas:
    DashboardDTO:
      type: object
      properties:
        ventasDelDia:
          type: number
          format: decimal
          description: Total de ventas del día actual
          example: 45000.00
        ventasDelMes:
          type: number
          format: decimal
          description: Total de ventas del mes actual
          example: 1250000.00
        ticketPromedio:
          type: number
          format: decimal
          description: Valor promedio de cada venta
          example: 1500.00
        productosStockBajo:
          type: integer
          description: Cantidad de productos con stock por debajo del mínimo
          example: 12
        devolucionesDelDia:
          type: integer
          description: Número de devoluciones procesadas en el día
          example: 3
        clientesBloqueados:
          type: integer
          description: Cantidad de clientes bloqueados por morosidad
          example: 5
        productosProximosCaducar:
          type: integer
          description: Productos que caducan en los próximos 30 días
          example: 8
        ultimaActualizacion:
          type: string
          format: date-time
          description: Fecha y hora de la última actualización de métricas
          example: "2026-03-06T14:30:00"
