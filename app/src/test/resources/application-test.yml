spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  
  # Deshabilitar Flyway en tests (usamos create-drop de Hibernate)
  flyway:
    enabled: false

# Deshabilitar Swagger/OpenAPI en tests
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

jwt:
  secret: TestSecretKeyForIntegrationTests2026!
  expiration: 3600000

logging:
  level:
    root: WARN
    com.nexoohub.almacen: INFO
