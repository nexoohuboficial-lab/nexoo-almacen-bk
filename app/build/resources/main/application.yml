spring:
  datasource:
    # Opción A: Variable completa (Recomendado para AWS)
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    # Opción B: Si prefieres desglosar (útil para ver fallos específicos)
    # url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      # 'validate' solo valida que el esquema coincida (Flyway maneja las migraciones)
      ddl-auto: validate
    show-sql: false  # Cambiar a false en producción para mejor performance
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Habilitar estadísticas de Hibernate para detectar N+1
        generate_statistics: true
        # Configuración de batch para mejorar performance en inserts/updates múltiples
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Configuración de Flyway para migraciones de BD
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        # Exponemos salud, info y métricas
        include: "health,info,metrics"
  endpoint:
    health:
      # Muestra detalles de la DB y disco (muy útil en AWS)
      show-details: always
  info:
    env:
      enabled: true

# Información básica de NexooHub
info:
  app:
    name: "NexooHub Almacén"
    description: "Microservicio de gestión de inventarios para refaccionarias"
    version: "1.0.0-SNAPSHOT"

logging:
  level:
    root: INFO # Por defecto, solo errores e info importante
    com.nexoohub.almacen: INFO # En TU código queremos ver hasta el mínimo detalle
    org.hibernate.SQL: DEBUG # Ver las consultas SQL completas
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE # Ver los valores bindeados
    org.hibernate.stat: DEBUG # Estadísticas de Hibernate (detecta N+1)
    org.springframework.orm.jpa: DEBUG # Log de transacciones JPA
  logging:
    pattern:
      # [%X{traceId}] es la clave mágica aquí
      console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

jwt:
  # Esta es tu clave secreta. En AWS la pasaremos como variable de entorno.
  # DEBE ser una cadena larga (mínimo 32 caracteres para HS256)
  secret: ${JWT_SECRET:NexooHubSuperSecretKeyParaFirmaDeTokens2026!}
  # Tiempo de vida del token en milisegundos (Ej. 8 horas = 28800000)
  expiration: 3600000